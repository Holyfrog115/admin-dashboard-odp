<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="logo">
                Dashboard
            </div>
            <div class="navigation-links">
                <ul>
                    <li>
                        Home
                    </li>
                    <li>
                        Profile
                    </li>
                    <li>
                        Messages
                    </li>
                    <li>
                        History
                    </li>
                    <li>
                        Tasks
                    </li>
                    <li>
                        Communities
                    </li>
                </ul>
            </div>
            <div class="system-utilities">
                <ul>
                    <li>
                        Settings
                    </li>
                    <li>
                        Support
                    </li>
                    <li>
                        Privacy
                    </li>
                </ul>
            </div>
        </div>
        <div class="header">
            <div class="top-section">
                <div class="search">
                    <!-- search icon -->
                    <form action="" method="get">
                        <input type="search" name="searchData" id="search">
                    </form>
                </div>
                <div class="profile-mini">
                    <!-- notification icon -->
                    <!-- profile image -->
                    <div class="profile-name">John Johnson</div>
                </div>
            </div>
            <div class="bottom-section">
                <div class="profile">
                    <!-- profile image -->
                    <div class="proile-name">
                        <div id="greeting-statement">Hi there,</div>
                        <div class="username">John Johnson (@jjonson)</div>
                    </div>
                </div>
                <div class="buttons">
                    <button>New</button>
                    <button>Upload</button>
                    <button>Share</button>
                </div>
            </div>
        </div>
        <div class="main">
            Main content
        </div>
    </div>
</body>
</html>
